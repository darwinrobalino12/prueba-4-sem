{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Historial de Archivos / Actividad</h2>
    <hr>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Paciente</th>
                <th>Fecha</th>
                <th>Descripción</th>
            </tr>
        </thead>
        <tbody>
            {% for archivo in archivos %}
            <tr>
                <td>{{ archivo.id }}</td>
                <td>{{ archivo.paciente }}</td>
                <td>{{ archivo.fecha }}</td>
                <td>{{ archivo.detalle }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
